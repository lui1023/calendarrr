  <style>
    /* Background */
    body {
      background-color: #6eb1d8;
      overflow-x: hidden;
      margin: 0;
    }

    h1 {
      font-size: 2.2rem;
    }

    p {
      font-size: 1.3rem;
    }

    /* Glowing GIF */
    .container .tenor-gif-embed {
      max-width: 400px;
      width: 100%;

      border: 3px solid white;
      border-radius: 12px;
      box-shadow:
        0 0 10px white,
        0 0 20px white,
        0 0 40px rgba(255, 255, 255, 0.8);

      overflow: hidden;
    }

    /* Keep page content above falling dogs */
    .container {
      position: relative;
      z-index: 10;
      padding: 20px;
    }

    /* Falling dog images */
    .falling-dog {
      position: fixed;
      top: -100px;
      pointer-events: none;
      z-index: 1;

      animation: fall linear forwards;
    }

    @keyframes fall {
      0% {
        transform: translate(0, -100px) rotate(0deg);
      }

      25% {
        transform: translate(40px, 25vh) rotate(90deg);
      }

      50% {
        transform: translate(-40px, 50vh) rotate(180deg);
      }

      75% {
        transform: translate(30px, 75vh) rotate(270deg);
      }

      100% {
        transform: translate(-30px, calc(100vh + 150px)) rotate(360deg);
      }
    }
  </style>
</head>

  <script>
    function createFallingDog() {
      const dog = document.createElement("img");

      dog.src = "babydog.png"; // your uploaded image
      dog.classList.add("falling-dog");

      dog.style.left = Math.random() * window.innerWidth + "px";

      const size = Math.random() * 30 + 30; // 30px - 60px
      dog.style.width = size + "px";

      dog.style.animationDuration =
        (Math.random() * 4 + 5) + "s";

      document.body.appendChild(dog);

      setTimeout(() => {
        dog.remove();
      }, 10000);
    }

    setInterval(createFallingDog, 300);
